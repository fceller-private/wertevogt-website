<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WerteVogt GmbH - Facility Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f9f9f9;
            font-family: 'Montserrat', sans-serif;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .logo {
            max-width: 100%;
            height: auto;
            width: 450px; /* Passt die Größe des Logos an */
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-top: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-top: 15px;
        }
        .divider {
            width: 50px;
            height: 3px;
            background-color: #f39c12; /* Passend zum Orange im Logo */
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Logo.png" alt="WerteVogt GmbH Logo" class="logo">
        
        <div class="divider"></div>
        
        <h1>Coming soon...</h1>
        
        <p class="subtitle">Wir arbeiten an unserem neuen Webauftritt für Sie.</p>
    </div>

</body>
</html>
